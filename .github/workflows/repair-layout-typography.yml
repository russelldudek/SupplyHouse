name: Repair evidence layout and document readability

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/repair-layout-typography.yml

permissions:
  contents: write
  statuses: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install browser and PDF tooling
        run: |
          python3 -m pip install --quiet playwright pypdf pymupdf
          python3 -m playwright install --with-deps chromium

      - name: Create focused regression harness
        shell: bash
        run: |
          cat > /tmp/check_layout_typography.py <<'PY'
          from __future__ import annotations
          import sys
          from pathlib import Path
          from playwright.sync_api import sync_playwright

          ROOT = Path.cwd()

          def file_url(name: str) -> str:
              return (ROOT / name).resolve().as_uri()

          def rendered_text_box(locator):
              return locator.evaluate("""el => {
                const range = document.createRange();
                range.selectNodeContents(el);
                const rect = range.getBoundingClientRect();
                return {x: rect.x, y: rect.y, width: rect.width, height: rect.height,
                        right: rect.right, bottom: rect.bottom};
              }""")

          def check_layout(page) -> None:
              failures = []
              for width in (1041, 1040, 768, 600):
                  page.set_viewport_size({"width": width, "height": 1100})
                  page.goto(file_url("index.html") + f"?w={width}", wait_until="load")
                  item = page.locator(".evidence-item").filter(has_text="Compunetics").first
                  name = item.locator(":scope > strong")
                  details = item.locator(":scope > div")
                  name_box = rendered_text_box(name)
                  details_box = details.bounding_box()
                  if not details_box:
                      failures.append(f"{width}px: missing detail bounds")
                      continue
                  gap = details_box["x"] - name_box["right"]
                  if gap < 12:
                      failures.append(f"{width}px: Compunetics text/detail gap {gap:.2f}px")
              if failures:
                  raise AssertionError("; ".join(failures))

          def check_type(page) -> None:
              page.set_viewport_size({"width": 1200, "height": 1000})
              page.goto(file_url("resume.html") + "?type=resume", wait_until="load")
              page.emulate_media(media="print")
              general = float(page.locator(".doc-section p").first.evaluate("el => parseFloat(getComputedStyle(el).fontSize)"))
              if general < 10.5:
                  raise AssertionError(f"general document body type is {general:.2f}px; expected >= 10.5px")

              page.goto(file_url("cover-letter.html") + "?type=cover", wait_until="load")
              page.emulate_media(media="print")
              cover = float(page.locator(".cover-page .doc-section p").first.evaluate("el => parseFloat(getComputedStyle(el).fontSize)"))
              if cover < 12.0:
                  raise AssertionError(f"cover-letter body type is {cover:.2f}px; expected >= 12px")

          mode = sys.argv[1]
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True, args=["--no-sandbox"])
              page = browser.new_page()
              try:
                  if mode in ("layout", "all"):
                      check_layout(page)
                  if mode in ("type", "all"):
                      check_type(page)
              finally:
                  browser.close()
          PY

      - name: Prove the reported regressions exist
        shell: bash
        run: |
          set +e
          python3 /tmp/check_layout_typography.py layout
          layout_status=$?
          python3 /tmp/check_layout_typography.py type
          type_status=$?
          set -e
          if [ "$layout_status" -eq 0 ]; then
            echo "Layout regression test unexpectedly passed before the fix." >&2
            exit 1
          fi
          if [ "$type_status" -eq 0 ]; then
            echo "Typography regression test unexpectedly passed before the fix." >&2
            exit 1
          fi
          echo "Both user-reported regressions reproduced before repair."

      - name: Apply minimal layout and typography repair
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('styles.css')
          css = path.read_text(encoding='utf-8')
          replacements = {
              ".evidence-item { display: grid; grid-template-columns: 130px 1fr; gap: 28px; padding: 26px 0; border-bottom: 1px solid rgba(255,255,255,.14); }":
              ".evidence-item { display: grid; grid-template-columns: minmax(180px, .44fr) minmax(0, 1fr); gap: 28px; padding: 26px 0; border-bottom: 1px solid rgba(255,255,255,.14); }",
              ".evidence-item strong { font-size: 1.6rem; color: #fff; }":
              ".evidence-item strong { font-size: 1.6rem; line-height: 1.05; color: #fff; }",
              ".doc-section h3 { margin: 0 0 6px; padding-bottom: 4px; border-bottom: 1px solid var(--sh-line); font-size: 10.8px; text-transform: uppercase; letter-spacing: .1em; color: var(--sh-brown); }":
              ".doc-section h3 { margin: 0 0 6px; padding-bottom: 4px; border-bottom: 1px solid var(--sh-line); font-size: 11.2px; text-transform: uppercase; letter-spacing: .1em; color: var(--sh-brown); }",
              ".doc-section h4 { margin: 0; font-size: 10.9px; }":
              ".doc-section h4 { margin: 0; font-size: 11.3px; }",
              ".doc-section p, .doc-section li, .doc-section td, .doc-section th { font-size: 9.75px; line-height: 1.42; }":
              ".doc-section p, .doc-section li, .doc-section td, .doc-section th { font-size: 10.6px; line-height: 1.44; }",
              ".doc-role h4 { font-size: 11.4px; }":
              ".doc-role h4 { font-size: 11.8px; }",
              ".doc-role .meta { font-size: 9.1px; color: var(--sh-muted); }":
              ".doc-role .meta { font-size: 9.5px; color: var(--sh-muted); }",
              ".doc-chip { padding: 4px 7px; border: 1px solid var(--sh-line); border-radius: 999px; font-size: 9.1px; font-weight: 800; }":
              ".doc-chip { padding: 4px 7px; border: 1px solid var(--sh-line); border-radius: 999px; font-size: 9.5px; font-weight: 800; }",
              ".cover-page .doc-section p { font-size: 11.45px; line-height: 1.54; margin-bottom: 10px; }":
              ".cover-page .doc-section p { font-size: 12.1px; line-height: 1.5; margin-bottom: 10px; }",
          }
          for old, new in replacements.items():
              if old not in css:
                  raise SystemExit(f'missing expected CSS rule: {old}')
              css = css.replace(old, new, 1)
          path.write_text(css, encoding='utf-8')

          audit = Path('campaign-audit.md')
          text = audit.read_text(encoding='utf-8')
          marker = '## Readability and rendered-geometry correction - 2026-07-22'
          if marker not in text:
              text += f'''\n\n{marker}\n\n- User-observed defect: `Compunetics` exceeded the fixed 130px evidence-name column at tablet widths and visually collided with the adjacent descriptor.\n- Root cause: document-flow overflow inside a fixed grid track was not covered by the prior whole-page horizontal-overflow check.\n- Correction: the evidence rows now reserve a flexible 180px minimum name track and a shrink-safe details track; mobile stacking remains unchanged.\n- Document readability: shared body copy, headings, role metadata and chips were increased; the cover-letter body was increased to 12.1 CSS px while preserving its one-page contract.\n- Regression coverage: rendered text-range separation is measured at 1041, 1040, 768 and 600px; print font minimums, page counts, footer clearance and cover-letter page use are release-blocking.\n'''
              audit.write_text(text, encoding='utf-8')
          PY

      - name: Verify repair, regenerate PDFs and inspect page geometry
        shell: bash
        run: |
          python3 /tmp/check_layout_typography.py all
          cat > /tmp/render_and_verify.py <<'PY'
          from __future__ import annotations
          from pathlib import Path
          import fitz
          from pypdf import PdfReader
          from playwright.sync_api import sync_playwright

          ROOT = Path.cwd()
          OUT = ROOT / 'docs'
          OUT.mkdir(exist_ok=True)
          QA = ROOT / '_qa_typography'
          QA.mkdir(exist_ok=True)

          specs = [
              ('resume.html', 'Russell-Dudek-SupplyHouse-Resume.pdf', False, 2),
              ('cover-letter.html', 'Russell-Dudek-SupplyHouse-Cover-Letter.pdf', False, 1),
              ('interview-brief.html', 'Russell-Dudek-SupplyHouse-Candidate-Thesis-Brief.pdf', False, 3),
              ('120-day-plan.html', 'Russell-Dudek-SupplyHouse-120-Day-Plan.pdf', False, 3),
              ('ai-fit-review.html', 'Russell-Dudek-SupplyHouse-AI-Fit-to-Work-Review.pdf', True, 1),
          ]

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True, args=['--no-sandbox'])

              # Capture the repaired evidence block at the viewport that exposed the defect.
              evidence = browser.new_page(viewport={'width': 768, 'height': 1024})
              evidence.goto((ROOT / 'index.html').resolve().as_uri() + '?qa=evidence', wait_until='load')
              evidence.locator('.evidence-list').screenshot(path=str(QA / 'evidence-768.png'))
              evidence.close()

              for html_name, pdf_name, landscape, expected_pages in specs:
                  page = browser.new_page(viewport={'width': 1400, 'height': 1100})
                  page.goto((ROOT / html_name).resolve().as_uri() + '?qa=print', wait_until='load')
                  page.emulate_media(media='print')

                  geometry = page.locator('.print-page').evaluate_all("""pages => pages.map((sheet, index) => {
                    const footer = sheet.querySelector('.doc-footer');
                    const children = [...sheet.children].filter(el => el !== footer);
                    const substantiveBottom = Math.max(...children.map(el => el.getBoundingClientRect().bottom));
                    const footerTop = footer ? footer.getBoundingClientRect().top : sheet.getBoundingClientRect().bottom;
                    const sheetBox = sheet.getBoundingClientRect();
                    return {
                      index,
                      gap: footerTop - substantiveBottom,
                      sheetHeight: sheetBox.height,
                      usedRatio: (substantiveBottom - sheetBox.top) / sheetBox.height
                    };
                  })""")
                  for record in geometry:
                      if record['gap'] < 4:
                          raise SystemExit(f"{html_name} page {record['index'] + 1}: content/footer collision ({record['gap']:.2f}px)")
                  if html_name == 'cover-letter.html':
                      gap = geometry[0]['gap']
                      if gap > 86:
                          raise SystemExit(f"cover letter leaves excessive lower-page white space ({gap:.2f}px)")

                  kwargs = dict(
                      path=str(OUT / pdf_name),
                      print_background=True,
                      margin={'top': '0', 'right': '0', 'bottom': '0', 'left': '0'},
                  )
                  if landscape:
                      kwargs.update(width='11in', height='8.5in', landscape=True, prefer_css_page_size=True)
                  else:
                      kwargs.update(format='Letter', landscape=False, prefer_css_page_size=False)
                  page.pdf(**kwargs)
                  page.close()

                  reader = PdfReader(str(OUT / pdf_name))
                  if len(reader.pages) != expected_pages:
                      raise SystemExit(f"{pdf_name}: expected {expected_pages} pages, got {len(reader.pages)}")

                  doc = fitz.open(OUT / pdf_name)
                  for i, pdf_page in enumerate(doc):
                      pix = pdf_page.get_pixmap(matrix=fitz.Matrix(1.5, 1.5), alpha=False)
                      pix.save(QA / f"{Path(pdf_name).stem}-p{i + 1}.png")
                  doc.close()

              browser.close()

          # Final PDF structural and confidentiality checks.
          expected = {
              'Russell-Dudek-SupplyHouse-Resume.pdf': 2,
              'Russell-Dudek-SupplyHouse-Cover-Letter.pdf': 1,
              'Russell-Dudek-SupplyHouse-Candidate-Thesis-Brief.pdf': 3,
              'Russell-Dudek-SupplyHouse-120-Day-Plan.pdf': 3,
              'Russell-Dudek-SupplyHouse-AI-Fit-to-Work-Review.pdf': 1,
          }
          for name, count in expected.items():
              path = OUT / name
              reader = PdfReader(str(path))
              if len(reader.pages) != count or path.stat().st_size == 0:
                  raise SystemExit(f'{name}: invalid generated PDF')
              text = '\n'.join(page.extract_text() or '' for page in reader.pages)
              if 'roleforge' in text.lower():
                  raise SystemExit(f'{name}: private process name found')
              print(f'{name}: {count} page(s), {path.stat().st_size} bytes')
          PY
          python3 /tmp/render_and_verify.py

      - name: Commit repaired source and generated documents
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add styles.css campaign-audit.md docs/*.pdf
          git commit -m 'Repair evidence layout and increase document readability'
          git push origin main
          FINAL_SHA=$(git rev-parse HEAD)
          gh api --method POST \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${{ github.repository }}/statuses/${FINAL_SHA}" \
            -f state=success \
            -f context='candidate-vision/layout-typography' \
            -f description='Evidence separation, readable type, PDF pagination and page geometry verified'

      - name: Mark failed repair
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${{ github.repository }}/statuses/${GITHUB_SHA}" \
            -f state=failure \
            -f context='candidate-vision/layout-typography' \
            -f description='Layout or document-readability repair failed'
