name: Build verified readability repair

on:
  push:
    branches: [agent/readability-repair]
    paths: [.github/workflows/readability-build.yml]

permissions:
  contents: write
  statuses: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/readability-repair
          fetch-depth: 0

      - name: Restore corrected readable source
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .readability/readability.part.00 \
            .readability/readability.part.01x00 \
            .readability/readability.part.01x01 \
            .readability/readability.part.01x02 \
            .readability/readability.part.01x03 \
            .readability/readability.part.02 \
            > /tmp/readability-source.b64
          base64 --decode /tmp/readability-source.b64 > /tmp/readability-source.tar.gz
          tar -xzf /tmp/readability-source.tar.gz -C .

      - name: Install renderer
        run: |
          python3 -m pip install --quiet playwright pypdf beautifulsoup4
          python3 -m playwright install --with-deps chromium

      - name: Generate and verify documents
        shell: bash
        run: |
          cat > /tmp/build.py <<'PY'
          from __future__ import annotations
          import asyncio, base64, re
          from pathlib import Path
          from bs4 import BeautifulSoup
          from playwright.async_api import async_playwright
          from pypdf import PdfReader

          ROOT = Path.cwd()
          DOCS = ROOT / 'docs'
          DOCS.mkdir(exist_ok=True)
          CSS = (ROOT / 'brand-tokens.css').read_text(encoding='utf-8') + '\n' + re.sub(
              r"@import url\(['\"]brand-tokens.css['\"]\);?", '',
              (ROOT / 'styles.css').read_text(encoding='utf-8')
          )
          LOGO = 'data:image/png;base64,' + base64.b64encode(
              (ROOT / 'assets/brand/supplyhouse-logo.png').read_bytes()
          ).decode()

          SPECS = [
              ('resume.html', 'Russell-Dudek-SupplyHouse-Resume.pdf', False, 2),
              ('cover-letter.html', 'Russell-Dudek-SupplyHouse-Cover-Letter.pdf', False, 1),
              ('interview-brief.html', 'Russell-Dudek-SupplyHouse-Candidate-Thesis-Brief.pdf', False, 4),
              ('120-day-plan.html', 'Russell-Dudek-SupplyHouse-120-Day-Plan.pdf', False, 4),
              ('ai-fit-review.html', 'Russell-Dudek-SupplyHouse-AI-Fit-to-Work-Review.pdf', True, 1),
          ]

          def inline(name: str) -> str:
              soup = BeautifulSoup((ROOT / name).read_text(encoding='utf-8'), 'html.parser')
              link = soup.find('link', rel='stylesheet')
              style = soup.new_tag('style')
              style.string = CSS
              link.replace_with(style)
              for image in soup.find_all('img', src='assets/brand/supplyhouse-logo.png'):
                  image['src'] = LOGO
              return str(soup)

          async def main() -> None:
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True, args=['--no-sandbox', '--disable-dev-shm-usage'])

                  for width in (1041, 1040, 768, 600, 390, 320):
                      page = await browser.new_page(viewport={'width': width, 'height': 1100})
                      await page.goto((ROOT / 'index.html').resolve().as_uri(), wait_until='load')
                      item = page.locator('.evidence-item').filter(has_text='Compunetics').first
                      stacked = await page.evaluate("matchMedia('(max-width: 520px)').matches")
                      if stacked:
                          columns = await item.evaluate("el => getComputedStyle(el).gridTemplateColumns")
                          if ' ' in columns.strip():
                              raise SystemExit(f'{width}px: evidence row did not stack')
                      else:
                          right = await item.locator(':scope > strong').evaluate("""el => {
                            const range = document.createRange();
                            range.selectNodeContents(el);
                            return range.getBoundingClientRect().right;
                          }""")
                          detail = await item.locator(':scope > div').bounding_box()
                          gap = detail['x'] - right
                          if gap < 12:
                              raise SystemExit(f'{width}px: Compunetics overlap gap {gap:.2f}px')
                      if await page.evaluate('document.documentElement.scrollWidth > document.documentElement.clientWidth + 1'):
                          raise SystemExit(f'{width}px: landing-page horizontal overflow')
                      await page.close()

                  for html_name, pdf_name, landscape, expected_pages in SPECS:
                      page = await browser.new_page(viewport={'width': 1400, 'height': 1100})
                      await page.set_content(inline(html_name), wait_until='load')
                      await page.emulate_media(media='print')
                      geometry = await page.locator('.print-page').evaluate_all("""pages => pages.map((sheet, index) => {
                        const footer = sheet.querySelector('.doc-footer');
                        const children = [...sheet.children].filter(el => el !== footer);
                        const bottom = Math.max(...children.map(el => el.getBoundingClientRect().bottom));
                        return {
                          page: index + 1,
                          gap: footer.getBoundingClientRect().top - bottom,
                          scrollHeight: sheet.scrollHeight,
                          clientHeight: sheet.clientHeight
                        };
                      })""")
                      for record in geometry:
                          if record['gap'] < 8:
                              raise SystemExit(f'{html_name} p{record["page"]}: footer gap {record["gap"]:.2f}px')
                          if record['scrollHeight'] > record['clientHeight'] + 1:
                              raise SystemExit(f'{html_name} p{record["page"]}: sheet overflow')

                      args = dict(
                          path=str(DOCS / pdf_name),
                          print_background=True,
                          margin={'top': '0', 'right': '0', 'bottom': '0', 'left': '0'},
                          display_header_footer=False,
                      )
                      if landscape:
                          args.update(width='11in', height='8.5in', landscape=True, prefer_css_page_size=True)
                      else:
                          args.update(format='Letter', landscape=False, prefer_css_page_size=False)
                      await page.pdf(**args)
                      await page.close()

                      reader = PdfReader(str(DOCS / pdf_name))
                      if len(reader.pages) != expected_pages:
                          raise SystemExit(f'{pdf_name}: expected {expected_pages}, got {len(reader.pages)}')
                      text = '\n'.join(pg.extract_text() or '' for pg in reader.pages)
                      if 'roleforge' in text.lower():
                          raise SystemExit(f'{pdf_name}: prohibited public process name')
                      print(f'{pdf_name}: {expected_pages} page(s), {(DOCS / pdf_name).stat().st_size} bytes')

                  await browser.close()

              public_text = '\n'.join(
                  path.read_text(encoding='utf-8', errors='ignore')
                  for path in [ROOT/'index.html', ROOT/'resume.html', ROOT/'cover-letter.html',
                               ROOT/'interview-brief.html', ROOT/'120-day-plan.html',
                               ROOT/'ai-fit-review.html', ROOT/'styles.css', ROOT/'campaign-audit.md']
              )
              if 'roleforge' in public_text.lower():
                  raise SystemExit('prohibited public process name in source')

          asyncio.run(main())
          PY
          python3 /tmp/build.py

      - name: Commit clean repaired branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm -rf .readability
          rm -f \
            .github/workflows/readability-build.yml \
            .github/workflows/repair-layout-typography.yml \
            .github/workflows/repair-layout-typography-v2.yml \
            .github/workflows/repair-layout-typography-v3.yml \
            repair-diagnostic.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Repair evidence layout and increase document readability'
          git push origin HEAD:agent/readability-repair
          SHA=$(git rev-parse HEAD)
          gh api --method POST -H 'Accept: application/vnd.github+json' \
            "/repos/${{ github.repository }}/statuses/${SHA}" \
            -f state=success \
            -f context='candidate-vision/layout-typography' \
            -f description='Evidence spacing, readable type and PDF geometry verified'
