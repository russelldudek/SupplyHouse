name: Publish complete candidate campaign

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  assemble:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct public source package
        shell: bash
        run: |
          set -euo pipefail
          test -f source-package.part-000
          cat source-package.part-* > source-package.b64
          base64 --decode source-package.b64 > source-package.tar.gz
          tar -xzf source-package.tar.gz
          rm -f source-package.part-* source-package.b64 source-package.tar.gz

      - name: Prepare committed brand derivative
        shell: bash
        run: |
          python3 -m pip install --quiet pillow
          python3 - <<'PY'
          from pathlib import Path
          from PIL import Image, ImageChops
          src = Path('assets/brand/supplyhouse-logo-source.webp')
          out = Path('assets/brand/supplyhouse-logo.png')
          image = Image.open(src).convert('RGBA')
          bg = Image.new('RGBA', image.size, (255, 255, 255, 255))
          diff = ImageChops.difference(image, bg)
          bbox = diff.getbbox()
          trimmed = image.crop(bbox) if bbox else image
          out.parent.mkdir(parents=True, exist_ok=True)
          trimmed.save(out, 'PNG', optimize=True)
          PY

      - name: Install browser renderer
        run: |
          npm install --no-package-lock
          npx playwright install --with-deps chromium

      - name: Generate PDFs
        run: npm run generate:pdfs

      - name: Verify PDF pagination
        shell: bash
        run: |
          python3 -m pip install --quiet pypdf
          python3 - <<'PY'
          from pathlib import Path
          from pypdf import PdfReader
          expected = {
              'docs/Russell-Dudek-SupplyHouse-Resume.pdf': 2,
              'docs/Russell-Dudek-SupplyHouse-Cover-Letter.pdf': 1,
              'docs/Russell-Dudek-SupplyHouse-Interview-Brief.pdf': 3,
              'docs/Russell-Dudek-SupplyHouse-120-Day-Plan.pdf': 4,
              'docs/Russell-Dudek-SupplyHouse-Workflow-Commissioning-Review.pdf': 2,
          }
          for path, count in expected.items():
              actual = len(PdfReader(path).pages)
              if actual != count:
                  raise SystemExit(f'{path}: expected {count} pages, got {actual}')
              if Path(path).stat().st_size == 0:
                  raise SystemExit(f'{path}: zero-byte PDF')
          print('PDF pagination verified.')
          PY

      - name: Commit complete campaign to main
        shell: bash
        run: |
          set -euo pipefail
          rm -rf node_modules
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish complete SupplyHouse candidate campaign [skip ci]"
          git push origin main
