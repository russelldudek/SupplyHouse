name: Release corrected SupplyHouse campaign

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/supplyhouse-rebuild
          fetch-depth: 0

      - name: Assemble corrected readable source
        shell: bash
        run: |
          set -euo pipefail
          test -f source-text.part-000
          cat source-text.part-* > /tmp/source-text.b64
          base64 --decode /tmp/source-text.b64 > /tmp/source-text.tar.gz
          mkdir -p /tmp/corrected-site /tmp/brand-assets
          tar -xzf /tmp/source-text.tar.gz -C /tmp/corrected-site
          cp -a assets/brand/. /tmp/brand-assets/
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/corrected-site/. .
          mkdir -p assets/brand
          cp -a /tmp/brand-assets/. assets/brand/

      - name: Install document renderer
        run: |
          python3 -m pip install --quiet playwright pypdf
          python3 -m playwright install --with-deps chromium

      - name: Generate and verify campaign PDFs
        shell: bash
        run: |
          cat > /tmp/generate_pdfs.py <<'PY'
          from __future__ import annotations
          import asyncio
          import base64
          import re
          from pathlib import Path
          from playwright.async_api import async_playwright
          from pypdf import PdfReader

          ROOT = Path.cwd()
          CSS = (ROOT / 'brand-tokens.css').read_text() + '\n' + re.sub(
              r"@import url\(['\"]brand-tokens.css['\"]\);?", '',
              (ROOT / 'styles.css').read_text()
          )

          def data_uri(path: Path) -> str:
              mime = 'image/png' if path.suffix.lower() == '.png' else 'image/webp'
              return f'data:{mime};base64,' + base64.b64encode(path.read_bytes()).decode()

          logo_png = data_uri(ROOT / 'assets/brand/supplyhouse-logo.png')
          logo_webp = data_uri(ROOT / 'assets/brand/supplyhouse-logo-source.webp')

          def inline_html(name: str) -> str:
              html = (ROOT / name).read_text()
              html = re.sub(r'<link rel="stylesheet" href="styles\.css">', f'<style>{CSS}</style>', html)
              html = html.replace('assets/brand/supplyhouse-logo.png', logo_png)
              html = html.replace('assets/brand/supplyhouse-logo-source.webp', logo_webp)
              return html

          pdfs = [
              ('resume.html', 'Russell-Dudek-SupplyHouse-Resume.pdf', False, 2),
              ('cover-letter.html', 'Russell-Dudek-SupplyHouse-Cover-Letter.pdf', False, 1),
              ('interview-brief.html', 'Russell-Dudek-SupplyHouse-Candidate-Thesis-Brief.pdf', False, 3),
              ('120-day-plan.html', 'Russell-Dudek-SupplyHouse-120-Day-Plan.pdf', False, 3),
              ('ai-fit-review.html', 'Russell-Dudek-SupplyHouse-AI-Fit-to-Work-Review.pdf', True, 1),
          ]

          async def main() -> None:
              (ROOT / 'docs').mkdir(exist_ok=True)
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True, args=['--no-sandbox', '--disable-dev-shm-usage'])
                  for html_name, pdf_name, landscape, _ in pdfs:
                      page = await browser.new_page(viewport={'width': 1440, 'height': 1000})
                      html = inline_html(html_name)
                      if landscape:
                          html = html.replace('</head>', '<style>@page { size: 11in 8.5in; margin: 0; }</style></head>')
                      await page.set_content(html, wait_until='load')
                      await page.emulate_media(media='print')
                      args = {
                          'path': str(ROOT / 'docs' / pdf_name),
                          'print_background': True,
                          'margin': {'top': '0', 'right': '0', 'bottom': '0', 'left': '0'},
                          'display_header_footer': False,
                      }
                      if landscape:
                          args.update(width='11in', height='8.5in', prefer_css_page_size=True)
                      else:
                          args.update(format='Letter', landscape=False, prefer_css_page_size=False)
                      await page.pdf(**args)
                      await page.close()
                  await browser.close()

              for _, pdf_name, _, expected in pdfs:
                  path = ROOT / 'docs' / pdf_name
                  reader = PdfReader(str(path))
                  actual = len(reader.pages)
                  if actual != expected:
                      raise SystemExit(f'{pdf_name}: expected {expected} pages, got {actual}')
                  if path.stat().st_size == 0:
                      raise SystemExit(f'{pdf_name}: zero-byte PDF')
                  text = '\n'.join((page.extract_text() or '') for page in reader.pages)
                  if re.search(r'role[\s_-]*forge', text, flags=re.I):
                      raise SystemExit(f'{pdf_name}: prohibited public process name found')
                  print(f'{pdf_name}: {actual} page(s), {path.stat().st_size} bytes')

          asyncio.run(main())
          PY
          python3 /tmp/generate_pdfs.py

      - name: Verify corrected campaign contract
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'Fit AI to the work' index.html
          grep -q 'Bring the people with it' index.html
          grep -q 'AI Fit-to-Work Review' ai-fit-review.html
          grep -q 'https://russelldudek.github.io/SupplyHouse/' resume.html
          grep -q 'https://russelldudek.github.io/SupplyHouse/' cover-letter.html
          test -f assets/brand/supplyhouse-logo.png
          test -f assets/brand/supplyhouse-logo-source.webp
          test -f docs/Russell-Dudek-SupplyHouse-Resume.pdf
          test -f docs/Russell-Dudek-SupplyHouse-Cover-Letter.pdf
          test -f docs/Russell-Dudek-SupplyHouse-Candidate-Thesis-Brief.pdf
          test -f docs/Russell-Dudek-SupplyHouse-120-Day-Plan.pdf
          test -f docs/Russell-Dudek-SupplyHouse-AI-Fit-to-Work-Review.pdf
          if grep -RniE 'role[[:space:]_-]*forge' --include='*.html' --include='*.css' --include='*.js' --include='*.md' --include='*.yml' .; then
            echo 'Prohibited public process name found.' >&2
            exit 1
          fi
          test ! -e commissioning-review.html
          test ! -e netlify.toml
          test ! -e package.json

      - name: Replace main with one coherent corrected release
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          TREE_SHA=$(git write-tree)
          RELEASE_SHA=$(printf '%s\n' 'Rebuild SupplyHouse enterprise AI adoption campaign' | git commit-tree "$TREE_SHA" -p "$GITHUB_SHA")
          git push origin "$RELEASE_SHA":refs/heads/main
          echo "Published corrected campaign at $RELEASE_SHA"
