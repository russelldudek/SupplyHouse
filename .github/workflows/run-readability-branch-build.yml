name: Run isolated readability repair build

on:
  push:
    branches: [main]
    paths: [.github/workflows/run-readability-branch-build.yml]

permissions:
  contents: write
  statuses: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/readability-repair
          fetch-depth: 0

      - name: Restore corrected source
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .readability/readability.part.00 \
            .readability/readability.part.01x00 \
            .readability/readability.part.01x01 \
            .readability/readability.part.01x02 \
            .readability/readability.part.01x03 \
            .readability/readability.part.02 \
            > /tmp/source.b64
          base64 --decode /tmp/source.b64 > /tmp/source.tar.gz
          tar -xzf /tmp/source.tar.gz -C .

      - name: Install renderer
        run: |
          python3 -m pip install --quiet playwright pypdf beautifulsoup4
          python3 -m playwright install --with-deps chromium

      - name: Render and verify
        shell: bash
        run: |
          cat > /tmp/build.py <<'PY'
          from __future__ import annotations
          import asyncio, base64, re
          from pathlib import Path
          from bs4 import BeautifulSoup
          from playwright.async_api import async_playwright
          from pypdf import PdfReader

          ROOT = Path.cwd()
          DOCS = ROOT / 'docs'
          DOCS.mkdir(exist_ok=True)
          CSS = (ROOT/'brand-tokens.css').read_text() + '\n' + re.sub(
              r"@import url\(['\"]brand-tokens.css['\"]\);?", '',
              (ROOT/'styles.css').read_text()
          )
          LOGO = 'data:image/png;base64,' + base64.b64encode(
              (ROOT/'assets/brand/supplyhouse-logo.png').read_bytes()
          ).decode()
          SPECS = [
              ('resume.html','Russell-Dudek-SupplyHouse-Resume.pdf',False,2),
              ('cover-letter.html','Russell-Dudek-SupplyHouse-Cover-Letter.pdf',False,1),
              ('interview-brief.html','Russell-Dudek-SupplyHouse-Candidate-Thesis-Brief.pdf',False,4),
              ('120-day-plan.html','Russell-Dudek-SupplyHouse-120-Day-Plan.pdf',False,4),
              ('ai-fit-review.html','Russell-Dudek-SupplyHouse-AI-Fit-to-Work-Review.pdf',True,1),
          ]

          def inline(name):
              soup = BeautifulSoup((ROOT/name).read_text(), 'html.parser')
              link = soup.find('link', rel='stylesheet')
              style = soup.new_tag('style'); style.string = CSS; link.replace_with(style)
              for image in soup.find_all('img', src='assets/brand/supplyhouse-logo.png'):
                  image['src'] = LOGO
              return str(soup)

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True, args=['--no-sandbox','--disable-dev-shm-usage'])
                  for width in (1041,1040,768,600,390,320):
                      page = await browser.new_page(viewport={'width':width,'height':1100})
                      await page.goto((ROOT/'index.html').resolve().as_uri(), wait_until='load')
                      item = page.locator('.evidence-item').filter(has_text='Compunetics').first
                      stacked = await page.evaluate("matchMedia('(max-width: 520px)').matches")
                      if not stacked:
                          right = await item.locator(':scope > strong').evaluate("""el => {
                            const r=document.createRange(); r.selectNodeContents(el);
                            return r.getBoundingClientRect().right;
                          }""")
                          detail = await item.locator(':scope > div').bounding_box()
                          gap = detail['x'] - right
                          if gap < 12: raise SystemExit(f'{width}px Compunetics gap {gap:.2f}px')
                      if await page.evaluate('document.documentElement.scrollWidth > document.documentElement.clientWidth + 1'):
                          raise SystemExit(f'{width}px landing overflow')
                      await page.close()

                  for html_name,pdf_name,landscape,expected in SPECS:
                      page = await browser.new_page(viewport={'width':1400,'height':1100})
                      await page.set_content(inline(html_name), wait_until='load')
                      await page.emulate_media(media='print')
                      geometry = await page.locator('.print-page').evaluate_all("""pages => pages.map((sheet,index)=>{
                        const footer=sheet.querySelector('.doc-footer');
                        const children=[...sheet.children].filter(el=>el!==footer);
                        const bottom=Math.max(...children.map(el=>el.getBoundingClientRect().bottom));
                        return {page:index+1,gap:footer.getBoundingClientRect().top-bottom,
                          scrollHeight:sheet.scrollHeight,clientHeight:sheet.clientHeight};
                      })""")
                      for g in geometry:
                          if g['gap'] < 8: raise SystemExit(f'{html_name} p{g["page"]} footer gap {g["gap"]:.2f}px')
                          if g['scrollHeight'] > g['clientHeight']+1: raise SystemExit(f'{html_name} p{g["page"]} overflow')
                      args=dict(path=str(DOCS/pdf_name),print_background=True,
                          margin={'top':'0','right':'0','bottom':'0','left':'0'},display_header_footer=False)
                      if landscape: args.update(width='11in',height='8.5in',landscape=True,prefer_css_page_size=True)
                      else: args.update(format='Letter',landscape=False,prefer_css_page_size=False)
                      await page.pdf(**args); await page.close()
                      reader=PdfReader(str(DOCS/pdf_name))
                      if len(reader.pages)!=expected: raise SystemExit(f'{pdf_name}: {len(reader.pages)} / {expected}')
                      text='\n'.join(pg.extract_text() or '' for pg in reader.pages)
                      if 'roleforge' in text.lower(): raise SystemExit(f'{pdf_name}: prohibited public name')
                      print(f'{pdf_name}: {expected} page(s), {(DOCS/pdf_name).stat().st_size} bytes')
                  await browser.close()

              source='\n'.join((ROOT/n).read_text(errors='ignore') for n in [
                  'index.html','resume.html','cover-letter.html','interview-brief.html',
                  '120-day-plan.html','ai-fit-review.html','styles.css','campaign-audit.md'])
              if 'roleforge' in source.lower(): raise SystemExit('prohibited public name in source')

          asyncio.run(main())
          PY
          python3 /tmp/build.py

      - name: Commit clean repair branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm -rf .readability
          rm -f \
            .github/workflows/readability-build.yml \
            .github/workflows/repair-layout-typography.yml \
            .github/workflows/repair-layout-typography-v2.yml \
            .github/workflows/repair-layout-typography-v3.yml \
            .github/workflows/run-readability-branch-build.yml \
            repair-diagnostic.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Repair evidence layout and increase document readability'
          git push origin HEAD:agent/readability-repair
          SHA=$(git rev-parse HEAD)
          gh api --method POST -H 'Accept: application/vnd.github+json' \
            "/repos/${{ github.repository }}/statuses/${SHA}" \
            -f state=success -f context='candidate-vision/layout-typography' \
            -f description='Evidence spacing, readable type and PDF geometry verified'
