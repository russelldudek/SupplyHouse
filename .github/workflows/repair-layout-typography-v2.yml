name: Instrument layout and typography repair

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/repair-layout-typography-v2.yml

permissions:
  contents: write
  statuses: write

jobs:
  diagnose-and-repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install browser and PDF tooling
        run: |
          python3 -m pip install --quiet playwright pypdf pymupdf
          python3 -m playwright install --with-deps chromium

      - name: Diagnose, repair and verify
        id: repair
        shell: bash
        run: |
          cat > /tmp/repair.py <<'PY'
          from __future__ import annotations
          from pathlib import Path
          import json
          import traceback
          import fitz
          from pypdf import PdfReader
          from playwright.sync_api import sync_playwright

          ROOT = Path.cwd()
          OUT = ROOT / 'docs'
          REPORT = ROOT / 'repair-diagnostic.md'
          results = []
          failures = []

          def record(name, ok, detail):
              results.append((name, ok, detail))
              if not ok:
                  failures.append(f'{name}: {detail}')

          try:
              css_path = ROOT / 'styles.css'
              css = css_path.read_text(encoding='utf-8')
              replacements = {
                  ".evidence-item { display: grid; grid-template-columns: 130px 1fr; gap: 28px; padding: 26px 0; border-bottom: 1px solid rgba(255,255,255,.14); }":
                  ".evidence-item { display: grid; grid-template-columns: minmax(180px, .44fr) minmax(0, 1fr); gap: 28px; padding: 26px 0; border-bottom: 1px solid rgba(255,255,255,.14); }",
                  ".evidence-item strong { font-size: 1.6rem; color: #fff; }":
                  ".evidence-item strong { font-size: 1.6rem; line-height: 1.05; color: #fff; }",
                  ".doc-section h3 { margin: 0 0 6px; padding-bottom: 4px; border-bottom: 1px solid var(--sh-line); font-size: 10.8px; text-transform: uppercase; letter-spacing: .1em; color: var(--sh-brown); }":
                  ".doc-section h3 { margin: 0 0 6px; padding-bottom: 4px; border-bottom: 1px solid var(--sh-line); font-size: 11.2px; text-transform: uppercase; letter-spacing: .1em; color: var(--sh-brown); }",
                  ".doc-section h4 { margin: 0; font-size: 10.9px; }":
                  ".doc-section h4 { margin: 0; font-size: 11.3px; }",
                  ".doc-section p, .doc-section li, .doc-section td, .doc-section th { font-size: 9.75px; line-height: 1.42; }":
                  ".doc-section p, .doc-section li, .doc-section td, .doc-section th { font-size: 10.6px; line-height: 1.44; }",
                  ".doc-role h4 { font-size: 11.4px; }":
                  ".doc-role h4 { font-size: 11.8px; }",
                  ".doc-role .meta { font-size: 9.1px; color: var(--sh-muted); }":
                  ".doc-role .meta { font-size: 9.5px; color: var(--sh-muted); }",
                  ".doc-chip { padding: 4px 7px; border: 1px solid var(--sh-line); border-radius: 999px; font-size: 9.1px; font-weight: 800; }":
                  ".doc-chip { padding: 4px 7px; border: 1px solid var(--sh-line); border-radius: 999px; font-size: 9.5px; font-weight: 800; }",
                  ".cover-page .doc-section p { font-size: 11.45px; line-height: 1.54; margin-bottom: 10px; }":
                  ".cover-page .doc-section p { font-size: 12.1px; line-height: 1.5; margin-bottom: 10px; }",
              }
              for old, new in replacements.items():
                  if old not in css:
                      record('css replacement', False, f'missing rule: {old}')
                  else:
                      css = css.replace(old, new, 1)
              if not failures:
                  css_path.write_text(css, encoding='utf-8')
                  record('css replacement', True, 'all targeted rules patched')

              specs = [
                  ('resume.html', 'Russell-Dudek-SupplyHouse-Resume.pdf', False, 2),
                  ('cover-letter.html', 'Russell-Dudek-SupplyHouse-Cover-Letter.pdf', False, 1),
                  ('interview-brief.html', 'Russell-Dudek-SupplyHouse-Candidate-Thesis-Brief.pdf', False, 3),
                  ('120-day-plan.html', 'Russell-Dudek-SupplyHouse-120-Day-Plan.pdf', False, 3),
                  ('ai-fit-review.html', 'Russell-Dudek-SupplyHouse-AI-Fit-to-Work-Review.pdf', True, 1),
              ]

              if not failures:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(headless=True, args=['--no-sandbox'])

                      for width in (1440, 1041, 1040, 768, 600, 390, 320):
                          page = browser.new_page(viewport={'width': width, 'height': 1100})
                          page.goto((ROOT / 'index.html').resolve().as_uri() + f'?w={width}', wait_until='load')
                          item = page.locator('.evidence-item').filter(has_text='Compunetics').first
                          stacked = page.evaluate("matchMedia('(max-width: 520px)').matches")
                          if stacked:
                              name_gap = 'stacked'
                              ok = True
                          else:
                              name_box = item.locator(':scope > strong').evaluate("""el => {
                                const range = document.createRange(); range.selectNodeContents(el);
                                const rect = range.getBoundingClientRect(); return {right: rect.right};
                              }""")
                              details = item.locator(':scope > div').bounding_box()
                              gap = details['x'] - name_box['right']
                              name_gap = f'{gap:.2f}px'
                              ok = gap >= 12
                          record(f'evidence gap {width}px', ok, name_gap)
                          if width == 768:
                              item.screenshot(path='evidence-768-repaired.png')
                          page.close()

                      page = browser.new_page(viewport={'width': 1200, 'height': 1000})
                      page.goto((ROOT / 'resume.html').resolve().as_uri(), wait_until='load')
                      page.emulate_media(media='print')
                      general = float(page.locator('.doc-section p').first.evaluate('el => parseFloat(getComputedStyle(el).fontSize)'))
                      record('general document type', general >= 10.5, f'{general:.2f}px')
                      page.close()

                      page = browser.new_page(viewport={'width': 1200, 'height': 1000})
                      page.goto((ROOT / 'cover-letter.html').resolve().as_uri(), wait_until='load')
                      page.emulate_media(media='print')
                      cover_size = float(page.locator('.cover-page .doc-section p').first.evaluate('el => parseFloat(getComputedStyle(el).fontSize)'))
                      record('cover letter type', cover_size >= 12.0, f'{cover_size:.2f}px')
                      page.close()

                      OUT.mkdir(exist_ok=True)
                      for html_name, pdf_name, landscape, expected_pages in specs:
                          page = browser.new_page(viewport={'width': 1400, 'height': 1100})
                          page.goto((ROOT / html_name).resolve().as_uri(), wait_until='load')
                          page.emulate_media(media='print')
                          geometry = page.locator('.print-page').evaluate_all("""pages => pages.map((sheet, index) => {
                            const footer = sheet.querySelector('.doc-footer');
                            const children = [...sheet.children].filter(el => el !== footer);
                            const substantiveBottom = Math.max(...children.map(el => el.getBoundingClientRect().bottom));
                            const footerTop = footer ? footer.getBoundingClientRect().top : sheet.getBoundingClientRect().bottom;
                            const sheetBox = sheet.getBoundingClientRect();
                            return {index, gap: footerTop - substantiveBottom,
                              usedRatio: (substantiveBottom - sheetBox.top) / sheetBox.height};
                          })""")
                          for g in geometry:
                              record(f'{html_name} page {g["index"] + 1} footer gap', g['gap'] >= 4, f'{g["gap"]:.2f}px; used {g["usedRatio"]:.3f}')
                          if html_name == 'cover-letter.html':
                              record('cover letter lower whitespace', geometry[0]['gap'] <= 120, f'{geometry[0]["gap"]:.2f}px')

                          kwargs = dict(path=str(OUT / pdf_name), print_background=True,
                                        margin={'top':'0','right':'0','bottom':'0','left':'0'})
                          if landscape:
                              kwargs.update(width='11in', height='8.5in', landscape=True, prefer_css_page_size=True)
                          else:
                              kwargs.update(format='Letter', landscape=False, prefer_css_page_size=False)
                          page.pdf(**kwargs)
                          page.close()

                          reader = PdfReader(str(OUT / pdf_name))
                          record(f'{pdf_name} page count', len(reader.pages) == expected_pages, f'{len(reader.pages)} / {expected_pages}')
                          text = '\n'.join(pg.extract_text() or '' for pg in reader.pages)
                          record(f'{pdf_name} confidentiality', 'roleforge' not in text.lower(), 'zero prohibited matches' if 'roleforge' not in text.lower() else 'prohibited match')

                          doc = fitz.open(OUT / pdf_name)
                          for i, pdf_page in enumerate(doc):
                              pix = pdf_page.get_pixmap(matrix=fitz.Matrix(1.0, 1.0), alpha=False)
                              pix.save(ROOT / f'_qa-{Path(pdf_name).stem}-p{i+1}.png')
                          doc.close()

                      browser.close()

              report = ['# SupplyHouse repair diagnostic', '', '## Results', '']
              for name, ok, detail in results:
                  report.append(f'- {"PASS" if ok else "FAIL"}: **{name}** - {detail}')
              report += ['', '## Outcome', '']
              if failures:
                  report.append('Repair blocked. No source or PDF changes were published.')
                  report += ['', '### Failures', ''] + [f'- {x}' for x in failures]
              else:
                  report.append('All layout, typography, page-geometry, pagination and confidentiality checks passed.')
              REPORT.write_text('\n'.join(report) + '\n', encoding='utf-8')

          except Exception as exc:
              failures.append(str(exc))
              REPORT.write_text('# SupplyHouse repair diagnostic\n\nRepair script exception:\n\n```\n' + traceback.format_exc() + '\n```\n', encoding='utf-8')

          print(REPORT.read_text(encoding='utf-8'))
          Path('/tmp/repair-success').write_text('yes' if not failures else 'no')
          PY
          python3 /tmp/repair.py

      - name: Publish repaired campaign when all gates pass
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if [ "$(cat /tmp/repair-success)" = "yes" ]; then
            python3 - <<'PY'
          from pathlib import Path
          audit = Path('campaign-audit.md')
          text = audit.read_text(encoding='utf-8')
          marker = '## Readability and rendered-geometry correction - 2026-07-22'
          if marker not in text:
              text += f'''\n\n{marker}\n\n- User-observed defect: `Compunetics` exceeded the fixed 130px evidence-name column at tablet widths and visually collided with the adjacent descriptor.\n- Root cause: text-range overflow inside a fixed grid track was not covered by the prior whole-page horizontal-overflow check.\n- Correction: the evidence rows reserve a flexible 180px minimum name track and a shrink-safe details track; mobile stacking remains unchanged.\n- Document readability: shared document type and the cover-letter body were increased while preserving exact page contracts and footer clearance.\n- Regression coverage: rendered text-range separation, print font minimums, exact PDF pagination, footer clearance, lower-page use and confidentiality are release-blocking.\n'''
              audit.write_text(text, encoding='utf-8')
          PY
            rm -f repair-diagnostic.md evidence-768-repaired.png _qa-*.png
            git add styles.css campaign-audit.md docs/*.pdf
            git commit -m 'Repair evidence layout and increase document readability'
            git push origin main
            FINAL_SHA=$(git rev-parse HEAD)
            gh api --method POST -H 'Accept: application/vnd.github+json' \
              "/repos/${{ github.repository }}/statuses/${FINAL_SHA}" \
              -f state=success -f context='candidate-vision/layout-typography' \
              -f description='Evidence spacing, readable type, PDF pagination and page geometry verified'
          else
            git add repair-diagnostic.md
            git commit -m 'Record SupplyHouse repair diagnostic'
            git push origin main
            FINAL_SHA=$(git rev-parse HEAD)
            gh api --method POST -H 'Accept: application/vnd.github+json' \
              "/repos/${{ github.repository }}/statuses/${FINAL_SHA}" \
              -f state=failure -f context='candidate-vision/layout-typography' \
              -f description='Repair diagnostic recorded; source remains unchanged'
          fi
